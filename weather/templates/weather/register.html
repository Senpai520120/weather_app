<!DOCTYPE html>
<html lang="uk">
<head>
    <link rel="icon" href="data:,">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Реєстрація</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>

        .form-text, .helptext {
            font-size: 0.8rem;
            color: #6c757d;
            display: block;
            margin-top: 4px;
        }
        .errorlist {
            color: #dc3545;
            list-style: none;
            padding-left: 0;
            font-size: 0.85rem;
            margin-bottom: 10px;
        }
    </style>
</head>
<body class="bg-light d-flex align-items-center justify-content-center vh-100">

    <div class="card p-4 shadow-sm" style="width: 100%; max-width: 450px;">
        <h3 class="text-center mb-4 fw-bold">Реєстрація</h3>

        <form method="POST">
            {% csrf_token %}

            {% if form.errors %}
                <div class="alert alert-danger p-2 small">
                    Будь ласка, виправте помилки нижче.
                </div>
            {% endif %}

            {% for field in form %}
                <div class="mb-3">
                    <label class="form-label fw-semibold small text-secondary">{{ field.label }}</label>

                    {{ field }}

                    {% if field.help_text %}
                        <span class="helptext">{{ field.help_text|safe }}</span>
                    {% endif %}

                    {% if field.errors %}
                        <div class="text-danger small mt-1">{{ field.errors }}</div>
                    {% endif %}
                </div>
            {% endfor %}

            <button type="submit" class="btn btn-success w-100 py-2 mt-2">Зареєструватися</button>
        </form>

        <div class="text-center mt-3 border-top pt-3">
            <a href="{% url 'login' %}" class="text-decoration-none small">Вже є акаунт? Увійти</a>
        </div>
    </div>

    <script>
        document.querySelectorAll('input').forEach(function(input) {
            if (input.type !== 'checkbox' && input.type !== 'submit') {
                input.classList.add('form-control');
            } else if (input.type === 'checkbox') {
                input.classList.add('form-check-input');
            }
        });
    </script>

</body>
</html>
