<!DOCTYPE html>
<html lang="ua">
<head>
    <link rel="icon" href="data:,">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie-edge">
    <title>погодний додаток</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>
<div class="d-flex flex-column flex-md-row align-items-center pb-3 mb-4 border-bottom container-fluid px-4">
    <a href="{% url 'home' %}" class="d-flex align-items-center link-body-emphasis text-decoration-none">
        <span class="fs-4 fw-bold">Погодний додаток</span>
    </a>
    <nav class="d-inline-flex mt-2 mt-md-0 ms-md-auto align-items-center">
        {% if user.is_authenticated %}
        <span class="me-3 text-secondary">Привіт, <strong>{{ user.username }}</strong>!</span>
        <form method="POST" action="{% url 'logout' %}" style="display:inline;">
            {% csrf_token %}
            <button class="btn btn-outline-danger btn-sm">
                Вихід
            </button>
        </form>
        {% else %}
        <a class="btn btn-outline-primary btn-sm me-2" href="{% url 'login' %}">Вхід</a>
        <a class="btn btn-primary btn-sm" href="{% url 'register' %}">Реєстрація</a>
        {% endif %}
    </nav>
</div>
<div class="container mt-5">
    <div class="row">
        <div class="col-5 offset-1">
            <h1>Погода у вашому мiстi</h1>
            <form method="POST">
                {% csrf_token %}
                {{ form.name }}
                <button type="submit" class="btn btn-primary mt-2">Добавить</button>
            </form>

        </div>
        <div class="col-4 offset-1">
            <h1>Iнформацiя</h1>
            {% for info in all_info %}
            <div class="card mt-3 p-3">
                <h3>{{ info.city }}</h3>
                <p>{{ info.temp }}°C</p>

                <img src="https://openweathermap.org/img/wn/{{ info.icon }}.png" alt="Погода"
                     style="width: 50px; height: 50px;" class="mx-auto my-2">

                <a href="{% url 'delete_city' city_id=info.id %}"
                   class="btn btn-danger mt-2">
                    Удалить
                </a>
            </div>
            {% endfor %}
        </div>
    </div>
</div>

</body>
</html>
